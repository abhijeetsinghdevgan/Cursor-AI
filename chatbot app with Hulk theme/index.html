<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GammaChat - Hulk x Banner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-left"></div>
    <div class="bg-glow bg-glow-right"></div>

    <main class="app">
      <header class="app-header">
        <div>
          <h1>GammaChat</h1>
          <p>Chat with Google Gemini in Hulk/Bruce Banner style.</p>
        </div>
        <span class="badge">Gamma Powered</span>
      </header>

      <section class="api-panel">
        <label for="apiKey">Gemini API Key</label>
        <div class="api-row">
          <input
            id="apiKey"
            type="password"
            placeholder="Paste your Gemini API key..."
            autocomplete="off"
          />
          <button id="saveKeyBtn" class="btn btn-secondary">Save Key</button>
        </div>
        <small
          >Stored only in your browser (`localStorage`) and used to call Gemini
          directly.</small
        >
      </section>

      <section id="chatWindow" class="chat-window" aria-live="polite"></section>

      <form id="chatForm" class="chat-form">
        <input
          id="messageInput"
          type="text"
          placeholder="Ask Gemini anything..."
          required
        />
        <button id="sendBtn" class="btn btn-primary" type="submit">Send</button>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
</html>
